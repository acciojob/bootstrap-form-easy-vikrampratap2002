<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Internship Form</title>
</head>

<body class="p-4">

<div class="container border p-4">

<h2 class="text-center mb-4">Internship Form</h2>

<form class="row g-3">

<!-- First Name -->
<div class="col-md-4">
<label for="first-name-input" class="form-label">First Name</label>
<input type="text" id="first-name-input" class="form-control" required>
<div class="invalid-feedback">Please enter first name</div>
</div>

<!-- Last Name -->
<div class="col-md-4">
<label for="last-name-input" class="form-label">Last Name</label>
<input type="text" id="last-name-input" class="form-control" required>
<div class="invalid-feedback">Please enter last name</div>
</div>

<!-- Email -->
<div class="col-md-4">
<label for="email-input" class="form-label">Email Address</label>
<input type="email" id="email-input" class="form-control" placeholder="xyz@abc.com" required>
<div class="invalid-feedback">Enter valid email</div>
</div>

<!-- College -->
<div class="col-md-6">
<label for="college-input" class="form-label">College</label>
<input type="text" id="college-input" class="form-control" required>
<div class="invalid-feedback">Enter college name</div>
</div>

<!-- Graduation Year -->
<div class="col-md-3">
<label for="grad-year-select" class="form-label">Graduation Year</label>
<select id="grad-year-select" class="form-select" required>
<option value="">Choose...</option>
<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>
</select>
<div class="invalid-feedback">Select graduation year</div>
</div>

<!-- Roll No -->
<div class="col-md-3">
<label for="roll-no-input" class="form-label">Roll No.</label>
<input type="text" id="roll-no-input" class="form-control" required>
<div class="invalid-feedback">Enter roll number</div>
</div>

<!-- Checkbox -->
<div class="col-12">
<div class="form-check">
<input type="checkbox" id="conditions-checkbox" class="form-check-input" required>
<label for="conditions-checkbox" class="form-check-label">Agree to terms and conditions</label>
<div class="invalid-feedback">You must agree before submitting</div>
</div>
</div>

<!-- Submit -->
<div class="col-12">
<button class="btn btn-primary">Submit form</button>
</div>

</form>

</div>

</body>
</html>
